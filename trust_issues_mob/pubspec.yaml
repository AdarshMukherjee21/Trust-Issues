name: trust_issues_mob
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  another_telephony: ^0.4.1
  flutter_local_notifications: ^20.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0




flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/trust_issues_logo_no_bg.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/trust_issues_logo_no_bg.png"


flutter_native_splash:
  color: "#000000"
  image: assets/Trust_issues_logo_horizontal_no_bg.png # This is fine for older Androids/iOS
  fullscreen: true 
  android_12:
    # Use the square/shield version here!
    image: assets/trust_issues_logo_no_bg.png 
    color: "#000000"
    fullscreen: true

    
flutter:


  uses-material-design: true

  
  assets:
      - assets/trust_issues_logo_no_bg.png
      - assets/trust_issues_logo.png
      - assets/Trust_issues_logo_horizontal_no_bg.png
      - assets/trust_issue_logo_white_no_bg.png
      - assets/trust_issues_logo_white.png
  



